name: CI

on: 
  workflow_dispatch: 
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  DOTNET_VERSION: '10'

jobs:
  name: build-and-test
  runs-on: ubuntu-latest

  steps:
    - name: Checkout 
      uses: actions/checkout@v6.0.2

    - name: Install .NET
      uses: actions/setup-dotnet@v5.2.0
      with:
        dotnet-version: ${{env.DOTNET_VERSION}}

    - name: Restore Dependencies
      run: dotnet restore Brisa-PMS-Demo.slnx

    - name: Build
      run: dotnet build Brisa-PMS-Demo.slnx --no-restore

    - name: Run Tests
      run: dotnet test Brisa-PMS-Demo.slnx --no-build
